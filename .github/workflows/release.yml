name: 'release'


on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build, lint, and package
        run: |
          npm run build
          npm run format-check
          npm run lint
          npm run package

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Get major version
        id: major
        run: echo "version=$(echo ${{ steps.tag.outputs.tag }} | cut -d. -f1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v9
        with:
          script: |
            const tag = '${{ steps.tag.outputs.tag }}';
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              generate_release_notes: true,
              draft: false,
              prerelease: false
            });
            console.log(`Created release: ${release.html_url}`);

      - name: Update floating major-version tag
        # e.g. keeps 'v1' pointing at the latest v1.x.x release
        # so users can pin to @v1 and always get the latest patch
        run: |
          MAJOR=${{ steps.major.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "Update $MAJOR tag to ${{ steps.tag.outputs.tag }}"
          git push origin "$MAJOR" --force
